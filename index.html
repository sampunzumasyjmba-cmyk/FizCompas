<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФизКомпас — интерактивный курс физики</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== Переменные ===== */
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --border: #cbd5e1;
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --completed: #22c55e;
            --watched: #f59e0b;
            --new: #94a3b8;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app {
            max-width: 1300px;
            margin: 0 auto;
            flex: 1;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px 0 20px;
            border-bottom: 2px solid var(--border);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-light);
        }
        .logo span { color: var(--text); }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn:hover { background: var(--primary-light); color: #fff; border-color: var(--primary-light); }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 6px;
            margin: 20px 0 24px;
            flex-wrap: wrap;
            background: var(--card);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .tab-btn:hover:not(.active) { background: var(--border); }

        .tab-content { display: none; animation: fade 0.25s; }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== Фильтры ===== */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }
        .filters input, .filters select {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 0.9rem;
            flex: 1 1 180px;
        }

        /* ===== Сетка уроков ===== */
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .lesson-card {
            background: var(--card);
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--new);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .lesson-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -8px rgba(0,0,0,0.15); }
        .lesson-card .title { font-weight: 600; font-size: 1rem; }
        .lesson-card .meta { display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.7; }
        .lesson-card .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .lesson-card .actions button {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text);
            transition: 0.15s;
        }
        .lesson-card .actions button:hover { background: var(--primary-light); color: #fff; }
        .status-badge {
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
            background: var(--new);
            color: #fff;
            align-self: flex-start;
        }
        .status-badge.completed { background: var(--completed); }
        .status-badge.watched { background: var(--watched); }

        .lesson-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            margin-top: 4px;
            position: relative;
        }
        .lesson-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.2s;
        }
        .lesson-thumb:hover img { transform: scale(1.02); }
        .lesson-thumb .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        /* ===== Календарь ===== */
        .calendar-container {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-grid .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--bg);
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
            position: relative;
            flex-direction: column;
            line-height: 1.2;
        }
        .calendar-grid .day:hover { background: var(--primary-light); color: #fff; }
        .calendar-grid .day.has-plan::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 6px;
            height: 6px;
            background: var(--primary-light);
            border-radius: 50%;
        }
        .calendar-grid .day.has-goal {
            border-bottom: 3px solid var(--watched);
        }
        .calendar-grid .day.other-month { opacity: 0.3; }
        .calendar-grid .day .day-number {
            font-weight: 600;
        }
        .calendar-grid .day .day-goal-indicator {
            font-size: 0.5rem;
            opacity: 0.6;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .day-plan-list {
            margin-top: 16px;
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
        }
        .day-plan-list ul { list-style: none; padding: 0; }
        .day-plan-list li {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        .day-plan-list li button {
            background: none;
            border: none;
            color: var(--primary-light);
            cursor: pointer;
        }

        /* ===== Прогресс и статистика ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--primary-light); }
        .stat-card .label { font-size: 0.8rem; opacity: 0.7; }

        .xp-bar {
            background: var(--card);
            border-radius: 40px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .xp-bar .progress {
            background: var(--bg);
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
            margin: 6px 0;
        }
        .xp-bar .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: width 0.4s;
        }
        .badge-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .badge {
            background: var(--card);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            opacity: 0.4;
            filter: grayscale(1);
        }
        .badge.unlocked { opacity: 1; filter: none; border-color: var(--primary-light); }

        .chart {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: flex-end;
            height: 120px;
            margin: 20px 0;
        }
        .chart-bar {
            flex: 1;
            max-width: 40px;
            background: var(--primary-light);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.3s;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text);
        }

        /* ===== Модалки ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            max-width: 90%;
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .modal select, .modal textarea, .modal input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
        }
        .modal .btn { margin-top: 8px; }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 20px 0 10px;
            border-top: 1px solid var(--border);
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 640px) {
            .header { flex-direction: column; align-items: stretch; }
            .tabs { overflow-x: auto; flex-wrap: nowrap; }
            .tab-btn { padding: 8px 14px; font-size: 0.8rem; white-space: nowrap; }
            .lesson-grid { grid-template-columns: 1fr; }
            .modal { width: 95%; }
        }
    </style>
</head>
<body>
<div class="app" id="app">

            <button class="btn" id="exportBtn"><i class="fas fa-download"></i> Экспорт</button>
            <button class="btn" id="importBtn"><i class="fas fa-upload"></i> Импорт</button>
            <input type="file" id="importFile" accept=".json" style="display:none;">
        </div>
    </header>

    <div class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="lessons"><i class="fas fa-list"></i> Уроки</button>
        <button class="tab-btn" data-tab="calendar"><i class="fas fa-calendar-alt"></i> Календарь</button>
        <button class="tab-btn" data-tab="progress"><i class="fas fa-chart-line"></i> Прогресс</button>
        <button class="tab-btn" data-tab="achievements"><i class="fas fa-trophy"></i> Достижения</button>
        <button class="tab-btn" data-tab="stats"><i class="fas fa-chart-pie"></i> Статистика</button>
        <button class="tab-btn" data-tab="owner"><i class="fas fa-user"></i> Владелец</button>
    </div>

    <div class="tab-content active" id="tab-lessons">
        <div class="filters">
            <input type="text" id="searchInput" placeholder="Поиск по названию или номеру...">
            <select id="sectionFilter"><option value="all">Все разделы</option></select>
            <select id="statusFilter">
                <option value="all">Все статусы</option>
                <option value="new">Новый</option>
                <option value="watched">Просмотрен</option>
                <option value="completed">Пройден</option>
            </select>
            <button class="btn" id="randomLessonBtn"><i class="fas fa-random"></i> Случайный</button>
        </div>
        <div class="lesson-grid" id="lessonGrid"></div>
    </div>

    <div class="tab-content" id="tab-calendar">
        <div class="calendar-container">
            <div class="calendar-header">
                <button class="btn" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                <span id="calendarMonthYear"></span>
                <button class="btn" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="day-plan-list" id="dayPlanList"><p>Выберите день для просмотра плана</p></div>
        </div>
    </div>

    <div class="tab-content" id="tab-progress">
        <div class="stats-grid" id="progressStats"></div>
        <div class="xp-bar">
            <div><span id="levelLabel">Новичок</span> · <span id="xpDisplay">0 XP</span></div>
            <div class="progress"><div class="progress-fill" id="xpProgressFill"></div></div>
            <div style="font-size:0.85rem; opacity:0.7;">До следующего уровня: <span id="xpToNext">100</span> XP</div>
        </div>
        <h3>Активность за 7 дней</h3>
        <div class="chart" id="activityChart"></div>
    </div>

    <div class="tab-content" id="tab-achievements">
        <div class="badge-grid" id="badgeGrid"></div>
    </div>

    <div class="tab-content" id="tab-stats">
        <div class="stats-grid" id="statsGrid"></div>
    </div>

    <div class="tab-content" id="tab-owner">
        <div style="background: var(--card); padding: 30px; border-radius: 12px; box-shadow: var(--shadow); text-align: center; font-size: 1.5rem;">
            <p><strong>Агафонов Ратмир</strong></p>
            <p>группа: ПТПИТ 25СТЭ1</p>
        </div>
    </div>

    <!-- Модалка для планирования урока -->
    <div class="modal-overlay" id="planModal">
        <div class="modal">
            <h3 id="planModalTitle">Запланировать урок</h3>
            <select id="planModalLessonSelect"></select>
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="btn" id="planModalSaveBtn">Сохранить</button>
                <button class="btn" id="planModalCloseBtn">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модалка для цели дня -->
    <div class="modal-overlay" id="goalModal">
        <div class="modal">
            <h3 id="goalModalTitle">Цель на день</h3>
            <input type="date" id="goalDateInput">
            <textarea id="goalTextInput" placeholder="Напишите вашу цель на этот день..." rows="3"></textarea>
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="btn" id="goalModalSaveBtn">Сохранить</button>
                <button class="btn" id="goalModalCloseBtn">Отмена</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        При поддержке бурмалды))
    </footer>
</div>

// ================================================================

const STORAGE_KEY = 'fizkompas_data';

function getDefaultState() {
    return {
        progress: {},     // { lessonId: 'new'|'watched'|'completed' }
        xp: 0,
        plans: {},        // { 'YYYY-MM-DD': [lessonId, ...] }
        notes: {},        // { lessonId: 'текст' }
        activity: {},     // { 'YYYY-MM-DD': count }
        dailyGoals: {}    // { 'YYYY-MM-DD': 'текст цели' }
    };
}

function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
        try {
            const data = JSON.parse(raw);
            if (!data.progress) data.progress = {};
            if (!data.xp) data.xp = 0;
            if (!data.plans) data.plans = {};
            if (!data.notes) data.notes = {};
            if (!data.activity) data.activity = {};
            if (!data.dailyGoals) data.dailyGoals = {};
            return data;
        } catch(e) {}
    }
    return getDefaultState();
}

function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ================================================================
// 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ================================================================
function getStatus(lessonId) {
    return state.progress[lessonId] || 'new';
}

function setStatus(lessonId, status, bonus = false) {
    const old = getStatus(lessonId);
    if (old === status) return;
    state.progress[lessonId] = status;
    if (status === 'watched') state.xp += 5;
    else if (status === 'completed') {
        state.xp += 10;
        if (bonus) state.xp += 3;
        const today = new Date().toISOString().slice(0,10);
        state.activity[today] = (state.activity[today] || 0) + 1;
    }
    saveState(state);
    renderAll();
}

function getSection(lessonId) {
    if (lessonId <= 6) return 'Измерения';
    if (lessonId <= 50) return 'Кинематика';
    if (lessonId <= 100) return 'Динамика';
    if (lessonId <= 138) return 'МКТ и термодинамика';
    if (lessonId <= 179) return 'МКТ и термодинамика (продолжение)';
    if (lessonId <= 245) return 'Электростатика';
    if (lessonId <= 269) return 'Постоянный ток';
    if (lessonId <= 293) return 'Магнетизм и индукция';
    if (lessonId <= 350) return 'Колебания и волны';
    if (lessonId <= 427) return 'Оптика';
    if (lessonId <= 463) return 'Квантовая физика';
    if (lessonId <= 474) return 'Ядерная физика';
    return 'Лабораторные работы';
}

function getLevel(xp) {
    if (xp < 100) return { name: 'Новичок', level: 1, next: 100 };
    if (xp < 300) return { name: 'Исследователь', level: 2, next: 300 };
    if (xp < 600) return { name: 'Физик-экспериментатор', level: 3, next: 600 };
    if (xp < 1000) return { name: 'Теоретик', level: 4, next: 1000 };
    return { name: 'Мастер физики', level: 5, next: Infinity };
}

// 4. РЕНДЕРИНГ
// ================================================================
function renderLessons() {
    const grid = document.getElementById('lessonGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const section = document.getElementById('sectionFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    let filtered = lessonsData.filter(lesson => {
        const title = lesson.title.toLowerCase();
        const idStr = lesson.id.toString();
        const matchSearch = title.includes(search) || idStr.includes(search);
        const matchSection = section === 'all' || getSection(lesson.id) === section;
        const matchStatus = statusFilter === 'all' || getStatus(lesson.id) === statusFilter;
        return matchSearch && matchSection && matchStatus;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '<p style="text-align:center; padding:40px;">Уроки не найдены</p>';
        return;
    }

    grid.innerHTML = filtered.map(lesson => {
        const status = getStatus(lesson.id);
        const statusClass = status === 'completed' ? 'completed' : status === 'watched' ? 'watched' : '';
        const statusLabel = status === 'completed' ? 'Пройден' : status === 'watched' ? 'Просмотрен' : 'Новый';
        const thumbUrl = `https://img.youtube.com/vi/${lesson.videoId}/hqdefault.jpg`;
        return `
            <div class="lesson-card" style="border-left-color: ${status === 'completed' ? 'var(--completed)' : status === 'watched' ? 'var(--watched)' : 'var(--new)'};">
                <div class="meta">
                    <span>#${lesson.id}</span>
                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                </div>
                <div class="title">${lesson.title}</div>
                <div class="lesson-thumb" onclick="openVideo('${lesson.videoId}')">
                    <img src="${thumbUrl}" alt="Превью" loading="lazy">
                    <div class="play-icon"><i class="fas fa-play-circle"></i></div>
                </div>
                <div class="actions">
                    <button onclick="openVideo('${lesson.videoId}')"><i class="fas fa-play"></i> Смотреть</button>
                    ${status !== 'watched' && status !== 'completed' ? `<button onclick="setStatus(${lesson.id}, 'watched')"><i class="fas fa-eye"></i> Просмотрен</button>` : ''}
                    ${status !== 'completed' ? `<button onclick="setStatus(${lesson.id}, 'completed', false)"><i class="fas fa-check"></i> Пройден</button>` : ''}
                    <button onclick="openPlanModal(${lesson.id})"><i class="fas fa-calendar-plus"></i> Запланировать</button>
                    <button onclick="openNoteModal(${lesson.id})"><i class="fas fa-pen"></i> Заметка</button>
                </div>
                ${state.notes[lesson.id] ? `<div style="font-size:0.8rem; opacity:0.6; margin-top:4px;">📝 ${state.notes[lesson.id]}</div>` : ''}
            </div>
        `;
    }).join('');
}

}

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const monthYear = document.getElementById('calendarMonthYear');
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date().toISOString().slice(0,10);

    monthYear.textContent = `${new Date(currentYear, currentMonth).toLocaleString('ru', { month: 'long', year: 'numeric' })}`;

    let html = '';
    const weekdays = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    let startOffset = (firstDay === 0) ? 6 : firstDay - 1;
    for (let i = 0; i < 7; i++) {
        html += `<div style="text-align:center; font-weight:600; font-size:0.8rem;">${weekdays[i]}</div>`;
    }
    for (let i = 0; i < startOffset; i++) {
        html += `<div class="day other-month"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasPlan = state.plans[dateStr] && state.plans[dateStr].length > 0;
        const hasGoal = state.dailyGoals[dateStr] && state.dailyGoals[dateStr].trim() !== '';
        const isToday = dateStr === today;
        const goalShort = hasGoal ? state.dailyGoals[dateStr].slice(0, 12) : '';
        html += `<div class="day ${hasPlan ? 'has-plan' : ''} ${hasGoal ? 'has-goal' : ''} ${isToday ? 'day-today' : ''}" onclick="openDayModal('${dateStr}')">
            <span class="day-number">${d}</span>
            ${hasGoal ? `<span class="day-goal-indicator">${goalShort}${state.dailyGoals[dateStr].length > 12 ? '…' : ''}</span>` : ''}
        </div>`;
    }

    grid.innerHTML = html;
    const todayEl = grid.querySelector('.day-today');
    if (todayEl) todayEl.style.border = '2px solid var(--primary-light)';

    selectDay(today);
}

function openDayModal(dateStr) {
    document.getElementById('goalDateInput').value = dateStr;
    document.getElementById('goalTextInput').value = state.dailyGoals[dateStr] || '';
    document.getElementById('goalModalTitle').textContent = `Цель на ${dateStr}`;
    document.getElementById('goalModal').classList.add('open');
}

function selectDay(dateStr) {
    const list = document.getElementById('dayPlanList');
    const plans = state.plans[dateStr] || [];
    const goal = state.dailyGoals[dateStr] || '';
    let html = `<h4>План на ${dateStr}</h4>`;
    if (goal) html += `<p><strong>Цель дня:</strong> ${goal}</p>`;
    if (plans.length === 0) {
        html += `<p>Нет запланированных уроков</p>`;
    } else {
        html += `<ul>` + plans.map(id => {
            const lesson = lessonsData.find(l => l.id === id);
            if (!lesson) return '';
            return `<li>${lesson.title} <button onclick="completePlanned(${id}, '${dateStr}')"><i class="fas fa-check"></i> Сделано</button></li>`;
        }).join('') + `</ul>`;
    }
    list.innerHTML = html;
}

function completePlanned(lessonId, dateStr) {
    state.plans[dateStr] = (state.plans[dateStr] || []).filter(id => id !== lessonId);
    setStatus(lessonId, 'completed', true);
    saveState(state);
    renderAll();
}

function openPlanModal(lessonId) {
    const overlay = document.getElementById('planModal');
    const select = document.getElementById('planModalLessonSelect');
    select.innerHTML = lessonsData.map(l => `<option value="${l.id}" ${l.id === lessonId ? 'selected' : ''}>${l.id}. ${l.title}</option>`).join('');
    document.getElementById('planModalTitle').textContent = 'Запланировать урок';
    overlay.classList.add('open');
    document.getElementById('planModalSaveBtn').onclick = function() {
        const selectedId = parseInt(select.value);
        const dateStr = prompt('Введите дату (ГГГГ-ММ-ДД):', new Date().toISOString().slice(0,10));
        if (!dateStr) return;
        if (!state.plans[dateStr]) state.plans[dateStr] = [];
        if (!state.plans[dateStr].includes(selectedId)) {
            state.plans[dateStr].push(selectedId);
            saveState(state);
            renderAll();
        }
        overlay.classList.remove('open');
    };
    document.getElementById('planModalCloseBtn').onclick = function() {
        overlay.classList.remove('open');
    };
}

function openNoteModal(lessonId) {
    const note = state.notes[lessonId] || '';
    const newNote = prompt('Введите заметку для урока:', note);
    if (newNote !== null) {
        if (newNote.trim() === '') delete state.notes[lessonId];
        else state.notes[lessonId] = newNote.trim();
        saveState(state);
        renderAll();
    }
}

// --- Прогресс ---
function renderProgress() {
    const total = lessonsData.length;
    const completed = lessonsData.filter(l => getStatus(l.id) === 'completed').length;
    const percent = total ? Math.round(completed / total * 100) : 0;

    document.getElementById('progressStats').innerHTML = `
        <div class="stat-card"><div class="value">${completed}</div><div class="label">Пройдено</div></div>
        <div class="stat-card"><div class="value">${total - completed}</div><div class="label">Осталось</div></div>
        <div class="stat-card"><div class="value">${percent}%</div><div class="label">Выполнено</div></div>
    `;

    const xp = state.xp;
    const level = getLevel(xp);
    document.getElementById('levelLabel').textContent = level.name;
    document.getElementById('xpDisplay').textContent = `${xp} XP`;
    const next = level.next === Infinity ? 0 : level.next - xp;
    document.getElementById('xpToNext').textContent = next > 0 ? next : 0;
    const progress = level.next === Infinity ? 100 : Math.min(100, (xp / level.next) * 100);
    document.getElementById('xpProgressFill').style.width = progress + '%';

    const days = [];
    for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0,10);
        days.push({ key, count: state.activity[key] || 0 });
    }
    const maxCount = Math.max(1, ...days.map(d => d.count));
    const chart = document.getElementById('activityChart');
    chart.innerHTML = days.map(d => `
        <div style="display:flex; flex-direction:column; align-items:center; flex:1;">
            <div class="chart-bar" style="height: ${(d.count / maxCount) * 100}%;"></div>
            <span style="font-size:0.6rem;">${d.key.slice(5)}</span>
            <span style="font-size:0.6rem;">${d.count}</span>
        </div>
    `).join('');
}

// --- Достижения ---
function renderAchievements() {
    const totalCompleted = lessonsData.filter(l => getStatus(l.id) === 'completed').length;
    const sections = {};
    lessonsData.forEach(l => {
        const sec = getSection(l.id);
        if (!sections[sec]) sections[sec] = { total: 0, done: 0 };
        sections[sec].total++;
        if (getStatus(l.id) === 'completed') sections[sec].done++;
    });

    const badges = [
        { id: 'first', label: 'Первые шаги', condition: totalCompleted >= 5 },
        { id: 'persistent', label: 'Настойчивый', condition: totalCompleted >= 50 },
        { id: 'pro', label: 'Профи', condition: totalCompleted >= 100 },
        { id: 'mechanic', label: 'Механик', condition: sections['Динамика'] && sections['Динамика'].done === sections['Динамика'].total },
        { id: 'electric', label: 'Электрик', condition: sections['Электростатика'] && sections['Электростатика'].done === sections['Электростатика'].total },
        { id: 'optic', label: 'Оптик', condition: sections['Оптика'] && sections['Оптика'].done === sections['Оптика'].total },
        { id: 'quantum', label: 'Квантовый скачок', condition: sections['Квантовая физика'] && sections['Квантовая физика'].done === sections['Квантовая физика'].total },
        { id: 'marathon', label: 'Марафонец', condition: Object.values(state.activity).some(v => v >= 10) },
        { id: 'streak', label: 'Стрелок', condition: (() => {
            let streak = 0;
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const key = d.toISOString().slice(0,10);
                if ((state.activity[key] || 0) >= 2) streak++;
                else break;
            }
            return streak >= 7;
        })() },
    ];

    const grid = document.getElementById('badgeGrid');
    grid.innerHTML = badges.map(b => `
        <div class="badge ${b.condition ? 'unlocked' : ''}">
            <i class="fas ${b.condition ? 'fa-check-circle' : 'fa-lock'}" style="color: ${b.condition ? 'var(--completed)' : 'var(--border)'};"></i>
            ${b.label}
        </div>
    `).join('');
}

// --- Статистика ---
function renderStats() {
    const total = lessonsData.length;
    const completed = lessonsData.filter(l => getStatus(l.id) === 'completed').length;
    const percent = total ? Math.round(completed / total * 100) : 0;
    const days = Object.keys(state.activity).length;
    const avg = days > 0 ? (completed / days).toFixed(1) : 0;
    const remaining = total - completed;
    const forecast = avg > 0 ? Math.ceil(remaining / avg) : '—';

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="value">${total}</div><div class="label">Всего уроков</div></div>
        <div class="stat-card"><div class="value">${completed}</div><div class="label">Пройдено</div></div>
        <div class="stat-card"><div class="value">${percent}%</div><div class="label">Выполнено</div></div>
        <div class="stat-card"><div class="value">${avg}</div><div class="label">Средняя скорость (ур./день)</div></div>
        <div class="stat-card"><div class="value">${forecast}</div><div class="label">Прогноз окончания (дней)</div></div>
    `;
}

function renderAll() {
    renderLessons();
    renderCalendar();
    renderProgress();
    renderAchievements();
    renderStats();
    // Обновить фильтры разделов
    const sectionSelect = document.getElementById('sectionFilter');
    if (sectionSelect.options.length <= 1) {
        const sections = [...new Set(lessonsData.map(l => getSection(l.id)))];
        sections.forEach(sec => {
            const opt = document.createElement('option');
            opt.value = sec;
            opt.textContent = sec;
            sectionSelect.appendChild(opt);
        });
    }
}

// ================================================================
// 5. СОБЫТИЯ И ИНИЦИАЛИЗАЦИЯ
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            if (this.dataset.tab === 'calendar') renderCalendar();
            if (this.dataset.tab === 'progress') renderProgress();
            if (this.dataset.tab === 'achievements') renderAchievements();
            if (this.dataset.tab === 'stats') renderStats();
        });
    });

    // Theme
    document.getElementById('themeToggle').addEventListener('click', function() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? '' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        this.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i> Светлая' : '<i class="fas fa-moon"></i> Тема';
    });

    // Search & filters
    document.getElementById('searchInput').addEventListener('input', renderLessons);
    document.getElementById('sectionFilter').addEventListener('change', renderLessons);
    document.getElementById('statusFilter').addEventListener('change', renderLessons);

    // Random lesson
    document.getElementById('randomLessonBtn').addEventListener('click', function() {
        const filtered = lessonsData.filter(l => getStatus(l.id) !== 'completed');
        if (filtered.length === 0) { alert('Все уроки пройдены!'); return; }
        const random = filtered[Math.floor(Math.random() * filtered.length)];
        openVideo(random.videoId);
    });

    // Calendar navigation
    document.getElementById('prevMonth').addEventListener('click', function() {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
    });
    document.getElementById('nextMonth').addEventListener('click', function() {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    });

    // Goal modal
    document.getElementById('goalModalSaveBtn').addEventListener('click', function() {
        const date = document.getElementById('goalDateInput').value;
        const text = document.getElementById('goalTextInput').value.trim();
        if (!date) return;
        if (text === '') delete state.dailyGoals[date];
        else state.dailyGoals[date] = text;
        saveState(state);
        renderAll();
        document.getElementById('goalModal').classList.remove('open');
    });
    document.getElementById('goalModalCloseBtn').addEventListener('click', function() {
        document.getElementById('goalModal').classList.remove('open');
    });

    // Export/Import
    document.getElementById('exportBtn').addEventListener('click', function() {
        const data = JSON.stringify(state, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'fizkompas_backup.json';
        a.click();
        URL.revokeObjectURL(url);
    });
    document.getElementById('importBtn').addEventListener('click', function() {
        document.getElementById('importFile').click();
    });
    document.getElementById('importFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                state = data;
                saveState(state);
                renderAll();
                alert('Данные импортированы!');
            } catch(err) {
                alert('Ошибка импорта');
            }
        };
        reader.readAsText(file);
        this.value = '';
    });

    renderAll();
});

// Глобальные функции для onclick
window.setStatus = setStatus;
window.openVideo = openVideo;
window.openPlanModal = openPlanModal;
window.openNoteModal = openNoteModal;
window.openDayModal = openDayModal;
window.selectDay = selectDay;
window.completePlanned = completePlanned;
</script>
</body>
</html>
